# 生产环境配置
splitter:
  # Seq 入口目录：扫描该目录下的所有文件夹作为订单
  inbox-dir: /data/youkang/Seq
  # 结果目录：拆分后的 Bam/Var/Sequence/QC 输出位置
  result-dir: /data/youkang/results
  # 归档目录：处理完成后的原始订单归档
  archive-dir: /data/youkang/archive
  # 扫描周期 cron 表达式（默认每分钟扫描一次）
  scan-cron: "0 */5 * * * ?"
  # 文件就绪检测间隔（秒）：两次大小一致即视为上传完成
  ready-check-interval-seconds: 10
  # 归档完成后是否删除原始 zip
  delete-after-archive: false
  # 文件锁定重试次数
  retry-times: 3
  # 文件锁定重试间隔（毫秒）
  retry-interval-ms: 2000
  secondary:
    enabled: true
    scan-cron: "0 */5 * * * ?"

logging:
  file:
    name: /data/youkang/splitter/logs/splitter.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      total-size-cap: 5GB
  level:
    root: INFO
    com.youkang.splitter: INFO
